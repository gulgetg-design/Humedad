name: Extraer SWI por estación

# Cómo se dispara:
on:
  workflow_dispatch:        # botón manual en la pestaña Actions
  schedule:
    - cron: "0 6 1,11,21 * *"   # decadal: días 1, 11 y 21 a las 06:00 UTC

# Permiso para que el workflow pueda commitear los resultados al repo
permissions:
  contents: write

# Evita que dos corridas se pisen
concurrency:
  group: swi-extraccion
  cancel-in-progress: false

jobs:
  extraer:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # tope ~5.8 h (el máximo de Actions es 6 h)

    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install openeo geopandas shapely pandas python-dateutil

      - name: Correr extracción SWI
        id: run
        continue-on-error: true     # no falla el job si quedó incompleto
        env:
          OPENEO_CLIENT_ID: ${{ secrets.OPENEO_CLIENT_ID }}
          OPENEO_CLIENT_SECRET: ${{ secrets.OPENEO_CLIENT_SECRET }}
        run: |
          set +e
          python Humedad.py
          CODE=$?
          set -e
          echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          echo "El script terminó con código $CODE"

      - name: Guardar resultados en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swi_parciales/ swi_estaciones.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Sin cambios para commitear"
          else
            git commit -m "SWI: avance de extracción [skip ci]"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi

      - name: Re-disparar si quedó incompleto
        if: steps.run.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Quedaron parciales pendientes. Re-disparando el workflow..."
          sleep 30
          gh workflow run swi.yml --ref ${{ github.ref_name }}

      - name: Avisar si está completo
        if: steps.run.outputs.exit_code == '0'
        run: echo "✓ Extracción COMPLETA. Todos los parciales descargados."
