name: SWI Data Pipeline

on:
  schedule:
    - cron: '*/45 * * * *'      # cada 45 minutos
  workflow_dispatch:            # botón manual

# Evita que dos corridas se pisen: la nueva espera en cola
concurrency:
  group: swi-pipeline-group
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas geopandas openeo python-dateutil pyarrow

      - name: Script 1 — Enviar jobs (solo los que faltan)
        env:
          OPENEO_CLIENT_ID: ${{ secrets.OPENEO_CLIENT_ID }}
          OPENEO_CLIENT_SECRET: ${{ secrets.OPENEO_CLIENT_SECRET }}
          PYTHONUNBUFFERED: "1"
        run: python swi_1_enviar.py

      - name: Script 2 — Descargar jobs listos y reportar faltantes
        env:
          OPENEO_CLIENT_ID: ${{ secrets.OPENEO_CLIENT_ID }}
          OPENEO_CLIENT_SECRET: ${{ secrets.OPENEO_CLIENT_SECRET }}
          PYTHONUNBUFFERED: "1"
        run: python swi_2_descargar.py

      - name: Guardar datos, logs y faltantes en el repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Pararse sobre el último commit remoto sin perder los archivos nuevos del disco
          git fetch origin main
          git reset --mixed origin/main

          # Agregar datos + logs + reporte de faltantes
          git add SWI_estaciones/ log_swi_envio.txt log_swi_descarga.txt swi_faltantes.txt

          if git diff --staged --quiet; then
            echo "No hay datos nuevos ni cambios para guardar."
            exit 0
          fi

          git commit -m "Actualización automática SWI [skip ci]"
          git push origin main
