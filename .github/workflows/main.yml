name: SWI Data Pipeline

on:
  schedule:
    # Corre cada 45 minutos automáticamente (puedes ajustar el tiempo)
    - cron: '*/45 * * * *'
  workflow_dispatch:
    # Esto te permite activar el proceso manualmente desde la web de GitHub si no quieres esperar al cron

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 1. Clonar el repositorio en la máquina virtual
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Optimiza el tiempo instalando dependencias

    # 3. Instalar las dependencias necesarias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pandas geopandas openeo python-dateutil pyarrow

    # 4. Crear la carpeta de salida si no existe y recuperar descargas previas
    # Usamos Git para mantener el estado de lo que ya se descargó en ejecuciones anteriores
    - name: Ejecutar Script 1 - Enviar Jobs
      env:
        OPENEO_CLIENT_ID: ${{ secrets.OPENEO_CLIENT_ID }}
        OPENEO_CLIENT_SECRET: ${{ secrets.OPENEO_CLIENT_SECRET }}
      run: python swi_1_enviar.py

    # 5. Ejecutar el Script 2 - Descargar y Consolidar
    - name: Ejecutar Script 2 - Descargar Jobs
      env:
        OPENEO_CLIENT_ID: ${{ secrets.OPENEO_CLIENT_ID }}
        OPENEO_CLIENT_SECRET: ${{ secrets.OPENEO_CLIENT_SECRET }}
      run: python swi_2_descargar.py

    # 6. Guardar los CSVs descargados de vuelta en tu repositorio de GitHub
    # De esta forma, la próxima vez que corra el Action, sabrá qué estaciones ya se completaron.
    # 6. Guardar los CSVs descargados de vuelta en tu repositorio de GitHub
    - name: Guardar cambios y descargas en el repositorio
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add SWI_estaciones/ log_swi_envio.txt log_swi_descarga.txt
        
        # ─── MODIFICAMOS ESTA LÍNEA ABAJO PARA INCLUIR EL PULL REBASE ───
        git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática de datos SWI [skip ci]" && git pull --rebase origin main && git push)
